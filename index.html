<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT Partner Pro | Premium Business CRM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #000000; --accent: #00d2ff; --bg: #050505; --card: #121212; --inner-card: #1a1a1a; --text: #e2e8f0; --success: #00f298; --danger: #ff4b5c; --warning: #ffb100; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .page-section { display: none; }
        .active-page { display: block; }
        .glass-card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 18px; border: 1px solid #1e1e1e; }
        
        /* Dashboard Amount Boxes */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
        .mini-stat { background: var(--inner-card); padding: 20px 10px; border-radius: 18px; text-align: center; border: 1px solid #222; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .mini-stat span { font-size: 10px; color: #666; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        .mini-stat p { font-size: 1.5rem; font-weight: 800; margin-top: 8px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .bg-pending { background: rgba(255, 177, 0, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .bg-complete { background: rgba(0, 242, 152, 0.1); color: var(--success); border: 1px solid var(--success); }
        .bg-canceled { background: rgba(255, 75, 92, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .report-tabs { display: flex; gap: 8px; margin-bottom: 15px; background: #111; padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 8px; text-align: center; font-size: 11px; border-radius: 8px; cursor: pointer; color: #666; transition: 0.3s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }

        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #222; background: #0a0a0a; color: white; outline: none; }
        .btn-premium { background: var(--accent); color: black; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-add { background: rgba(255,255,255,0.03); border: 1px dashed #333; color: #888; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { color: #555; text-align: center; cursor: pointer; font-size: 0.7rem; flex: 1; }
        .nav-item.active { color: var(--accent); }
        #setupOverlay, #profileModal { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
    </style>
</head>
<body>
    <div id="setupOverlay" style="align-items:center; justify-content:center;">
        <h1 style="color:var(--accent); font-weight:900; margin-bottom:5px; letter-spacing: -1px;">IT Partner Pro</h1>
        <p style="color:#444; margin-bottom:20px; font-size:12px;">Premium Business Solutions</p>
        <div style="background:#111; padding:30px; border-radius:24px; width:90%; max-width:400px; border:1px solid #222;">
            <input type="text" id="setAdminName" placeholder="অ্যাডমিন এর নাম">
            <input type="text" id="setShopName" placeholder="প্রতিষ্ঠানের নাম">
            <input type="tel" id="setPhone" placeholder="মোবাইল নম্বর">
            <input type="file" id="setLogo" style="border:none; color:#666; padding:0;">
            <button class="btn-premium" onclick="saveProfile()">অ্যাক্টিভেট করুন</button>
        </div>
    </div>

    <div id="profileModal">
        <div style="background:#111; padding:20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222;">
            <h2 id="mName" style="color:var(--accent)">Client Info</h2>
            <button onclick="closeProfile()" style="background:none; border:none; color:white; font-size:1.8rem;"><i class="fas fa-times"></i></button>
        </div>
        <div class="container" id="mContent" style="padding-top:10px;"></div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="headerLogo" src="" style="height:35px; width:35px; display:none; border-radius:8px;">
            <span id="headerShopName" style="font-weight:900; color: var(--accent);">IT PARTNER</span>
        </div>
        <i class="fas fa-redo-alt" onclick="location.reload()" style="opacity:0.4;"></i>
    </header>

    <div class="container">
        <div id="homePage" class="page-section active-page">
            <div class="report-tabs">
                <div class="tab active" onclick="changeReport('daily', this)">Daily</div>
                <div class="tab" onclick="changeReport('weekly', this)">Weekly</div>
                <div class="tab" onclick="changeReport('monthly', this)">Monthly</div>
            </div>
            <div class="stat-grid">
                <div class="mini-stat"><span>আজকের নগদ</span><p id="tCash" style="color:var(--success)">0৳</p></div>
                <div class="mini-stat"><span>আজকের বাকি</span><p id="tDue" style="color:var(--danger)">0৳</p></div>
            </div>
            <div class="glass-card">
                <canvas id="profitChart" style="width:100%; height:160px;"></canvas>
                <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-top: 15px;">
                    <input type="date" id="reportStart" style="margin-bottom:0; font-size:11px;">
                    <input type="date" id="reportEnd" style="margin-bottom:0; font-size:11px;">
                    <button onclick="downloadReportSheet()" style="background:var(--accent); border:none; padding:10px; border-radius:10px;"><i class="fas fa-file-pdf"></i></button>
                </div>
            </div>
            <button class="btn-premium" onclick="navTo('addClientPage', document.querySelectorAll('.nav-item')[2])"><i class="fas fa-plus-circle"></i> নতুন জব এন্ট্রি</button>
        </div>

        <div id="quotePage" class="page-section">
            <div class="glass-card">
                <h3 style="color:var(--accent); margin-bottom:15px; text-align:center;">QUOTATION</h3>
                <input type="text" id="qName" placeholder="কাস্টমারের নাম">
                <input type="tel" id="qPhone" placeholder="মোবাইল নম্বর">
                <table style="width:100%; margin-bottom:10px;"><tbody id="qBody">
                    <tr>
                        <td><input type="text" class="q-desc" placeholder="সার্ভিস"></td>
                        <td width="65"><input type="number" class="q-qty" value="1" oninput="calcQuote()"></td>
                        <td width="100"><input type="number" class="q-prc" placeholder="মূল্য" oninput="calcQuote()"></td>
                    </tr>
                </tbody></table>
                <button class="btn-add" onclick="addRow('qBody', 'q')">+ আরও সার্ভিস যোগ করুন</button>
                <div style="text-align:right; margin-bottom:15px; color:var(--accent);"><strong style="font-size:1.4rem;">মোট: <span id="qGrandTotal">0</span>৳</strong></div>
                <div style="display:flex; gap:8px;">
                    <button onclick="clearPage('quote')" style="background:#1a1a1a; color:#666; border:1px solid #333; border-radius:12px; padding:10px;">Clear</button>
                    <button class="btn-premium" style="flex:1" onclick="generatePDF('quote')"><i class="fas fa-download"></i> Get Quotation</button>
                    <button class="btn-premium" style="flex:0.3; background:var(--success)" onclick="convertToJob()"><i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </div>

        <div id="addClientPage" class="page-section">
            <div class="glass-card">
                <h3 style="color:var(--success); margin-bottom:15px; text-align:center;">NEW INVOICE</h3>
                <input type="text" id="cName" placeholder="কাস্টমারের নাম">
                <input type="tel" id="cPhone" placeholder="মোবাইল নম্বর">
                <div style="display:flex; gap:10px;"><input type="date" id="cDate" style="flex:1;"><input type="date" id="dDate" style="flex:1;"></div>
                <table style="width:100%;"><tbody id="jBody">
                    <tr>
                        <td><input type="text" class="j-desc" placeholder="বিবরণ"></td>
                        <td width="65"><input type="number" class="j-qty" value="1" oninput="calcJobBill()"></td>
                        <td width="100"><input type="number" class="j-prc" value="0" oninput="calcJobBill()"></td>
                    </tr>
                </tbody></table>
                <button class="btn-add" onclick="addRow('jBody', 'j')">+ সার্ভিস বিবরণ</button>
                <div class="stat-grid">
                    <input type="number" id="cBill" readonly placeholder="Total" style="color:var(--accent);">
                    <input type="number" id="cRec" value="0" oninput="calcJobBill()" placeholder="Recieved">
                </div>
                <button class="btn-premium" onclick="saveClient()">সেভ ও ইনভয়েস প্রিন্ট</button>
            </div>
        </div>

        <div id="listPage" class="page-section">
            <input type="text" id="clientSearch" placeholder="খুঁজুন..." onkeyup="filterClients()" style="background:#111; margin-bottom:15px;">
            <div id="clientList"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navTo('homePage', this)"><i class="fas fa-chart-pie"></i>Dash</div>
        <div class="nav-item" onclick="navTo('quotePage', this)"><i class="fas fa-file-invoice"></i>Quote</div>
        <div class="nav-item" onclick="navTo('addClientPage', this)"><i class="fas fa-plus-square"></i>Job</div>
        <div class="nav-item" onclick="navTo('listPage', this)"><i class="fas fa-users-cog"></i>Ledger</div>
    </nav>
    <script>
    let clients = []; let adminProfile = null; let myChart = null; let currentReportType = 'daily';
    const { jsPDF } = window.jspdf;

    window.onload = function() {
        const saved = localStorage.getItem('it_admin_v9');
        if(!saved) document.getElementById('setupOverlay').style.display = 'flex';
        else { adminProfile = JSON.parse(saved); updateHeader(); }
        clients = JSON.parse(localStorage.getItem('it_clients_v9')) || [];
        initChart(); changeReport('daily', document.querySelector('.tab'));
    };

    function saveProfile() {
        const name = document.getElementById('setAdminName').value;
        const shop = document.getElementById('setShopName').value;
        const phone = document.getElementById('setPhone').value;
        const file = document.getElementById('setLogo').files[0];
        if(!name || !shop || !phone) return alert("সব তথ্য দিন!");
        const reader = new FileReader();
        reader.onload = (e) => {
            adminProfile = { name, shop, phone, logo: e.target.result };
            localStorage.setItem('it_admin_v9', JSON.stringify(adminProfile)); location.reload();
        };
        if(file) reader.readAsDataURL(file);
        else { adminProfile={name, shop, phone, logo:''}; localStorage.setItem('it_admin_v9', JSON.stringify(adminProfile)); location.reload(); }
    }

    function updateHeader() { 
        document.getElementById('headerShopName').innerText = adminProfile.shop; 
        if(adminProfile.logo) { document.getElementById('headerLogo').src = adminProfile.logo; document.getElementById('headerLogo').style.display = 'block'; } 
    }

    function navTo(id, el) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'listPage') renderClients(clients);
        if(id === 'homePage') updateDashboard();
    }

    function changeReport(type, el) {
        currentReportType = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        updateDashboard();
    }

    function updateDashboard() {
        let tc = 0, td = 0; const now = new Date();
        const filtered = clients.filter(c => {
            const cDate = new Date(c.date);
            if(currentReportType === 'daily') return c.date === now.toISOString().split('T')[0];
            if(currentReportType === 'weekly') { const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7); return cDate >= weekAgo; }
            if(currentReportType === 'monthly') return cDate.getMonth() === now.getMonth() && cDate.getFullYear() === now.getFullYear();
        });
        filtered.forEach(c => { tc += c.rec; td += c.due; });
        document.getElementById('tCash').innerText = tc + "৳";
        document.getElementById('tDue').innerText = td + "৳";
        updateChart(filtered);
    }

    function updateChart(data) {
        let labels = [...new Set(data.map(c => c.date.split('-')[2]))].sort();
        let values = labels.map(l => { let sum = 0; data.filter(c => c.date.split('-')[2] === l).forEach(c => sum += c.rec); return sum; });
        myChart.data.labels = labels; myChart.data.datasets[0].data = values; myChart.update();
    }

    function addRow(id, type) { const f = type === 'q' ? 'calcQuote()' : 'calcJobBill()'; document.getElementById(id).insertAdjacentHTML('beforeend', `<tr><td><input type="text" class="${type}-desc"></td><td><input type="number" class="${type}-qty" value="1" oninput="${f}"></td><td><input type="number" class="${type}-prc" value="0" oninput="${f}"></td></tr>`); }
    function calcQuote() { let g = 0; document.querySelectorAll('#qBody tr').forEach(r => { g += (r.querySelector('.q-qty').value * r.querySelector('.q-prc').value); }); document.getElementById('qGrandTotal').innerText = g; }
    function calcJobBill() { let g = 0; document.querySelectorAll('#jBody tr').forEach(r => { g += (r.querySelector('.j-qty').value * r.querySelector('.j-prc').value); }); document.getElementById('cBill').value = g; }
    function clearPage(t) { if(confirm("Clear?")) { document.getElementById('qName').value=''; document.getElementById('qPhone').value=''; document.getElementById('qBody').innerHTML='<tr><td><input type="text" class="q-desc" placeholder="সার্ভিস"></td><td width="65"><input type="number" class="q-qty" value="1" oninput="calcQuote()"></td><td width="100"><input type="number" class="q-prc" placeholder="মূল্য" oninput="calcQuote()"></td></tr>'; calcQuote(); } }

    function convertToJob() {
        document.getElementById('cName').value = document.getElementById('qName').value;
        document.getElementById('cPhone').value = document.getElementById('qPhone').value;
        const jBody = document.getElementById('jBody'); jBody.innerHTML = "";
        document.querySelectorAll('#qBody tr').forEach(tr => {
            let d = tr.querySelector('.q-desc').value;
            if(d) jBody.insertAdjacentHTML('beforeend', `<tr><td><input type="text" class="j-desc" value="${d}"></td><td><input type="number" class="j-qty" value="${tr.querySelector('.q-qty').value}" oninput="calcJobBill()"></td><td><input type="number" class="j-prc" value="${tr.querySelector('.q-prc').value}" oninput="calcJobBill()"></td></tr>`);
        });
        calcJobBill(); navTo('addClientPage', document.querySelectorAll('.nav-item')[2]);
    }

    function saveClient() {
        const bill = parseFloat(document.getElementById('cBill').value);
        if(!document.getElementById('cName').value || bill <= 0) return alert("Fill Name & Bill!");
        const nc = { id: Date.now(), name: document.getElementById('cName').value, phone: document.getElementById('cPhone').value, bill, rec: parseFloat(document.getElementById('cRec').value) || 0, due: bill - (parseFloat(document.getElementById('cRec').value) || 0), date: document.getElementById('cDate').value || new Date().toISOString().split('T')[0], status: 'Pending', items: getItems('jBody') };
        clients.push(nc); localStorage.setItem('it_clients_v9', JSON.stringify(clients)); generatePDF('invoice', nc); location.reload();
    }

    function generatePDF(type, d) {
        const doc = new jsPDF(); const data = d || { name: document.getElementById('qName').value, phone: document.getElementById('qPhone').value, items: getItems('qBody'), bill: document.getElementById('qGrandTotal').innerText };
        if(!data.items.length) return alert("No items!");

        doc.setFillColor(type === 'quote' ? 0 : 15, type === 'quote' ? 210 : 185, type === 'quote' ? 255 : 129);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(26); doc.text(type.toUpperCase(), 15, 25);
        doc.setFontSize(10); doc.text(`Date: ${new Date().toLocaleDateString()}`, 15, 33);
        doc.setTextColor(0,0,0);
        doc.setFontSize(14); doc.text(`From: ${adminProfile.shop}`, 130, 50);
        doc.setFontSize(10); doc.text(`Proprietor: ${adminProfile.name}`, 130, 55);
        doc.text(`Contact: ${adminProfile.phone}`, 130, 60);
        doc.setFontSize(12); doc.text(`Bill To: ${data.name}`, 15, 50);
        doc.text(`Contact: ${data.phone}`, 15, 56);
        doc.autoTable({ head: [['Service', 'Qty', 'Price', 'Total']], body: data.items.map(i => [i.desc, i.qty, i.prc+"৳", i.total+"৳"]), startY: 70, theme: 'grid', headStyles: {fillColor: [0, 0, 0]} });
        let fY = doc.lastAutoTable.finalY + 15;
        doc.setFontSize(14); doc.text(`Grand Total: ${data.bill} Taka`, 15, fY);
        doc.setFontSize(10); doc.text("________________", 15, fY + 30); doc.text("Customer Signature", 15, fY + 35);
        doc.text("________________", 130, fY + 30); doc.text("Authorized Signature", 130, fY + 35);
        doc.save(`${type}_${data.name}.pdf`);
    }

    function renderClients(data) {
        const list = document.getElementById('clientList'); list.innerHTML = "";
        data.slice().reverse().forEach(c => {
            list.innerHTML += `<div class="glass-card" onclick="openProfile(${c.id})" style="border-left:5px solid ${c.due > 0 ? 'var(--danger)' : 'var(--success)'}; display:flex; justify-content:space-between; align-items:center;">
                <div><strong>${c.name}</strong> <span class="badge bg-${c.status.toLowerCase()}">${c.status}</span><br><small>${c.phone}</small></div>
                <div style="text-align:right;"><strong>${c.bill}৳</strong><br><small style="color:var(--danger)">Due: ${c.due}৳</small></div>
            </div>`;
        });
    }

    function openProfile(id) {
        const c = clients.find(x => x.id === id);
        let itemsHtml = c.items.map(i => `<tr><td style="padding:8px; border-bottom:1px solid #222;">${i.desc}</td><td style="text-align:right; padding:8px; border-bottom:1px solid #222;">${i.total}৳</td></tr>`).join('');
        document.getElementById('mName').innerText = c.name;
        document.getElementById('mContent').innerHTML = `<div class="glass-card"><p><strong>Phone:</strong> ${c.phone}</p><p><strong>Date:</strong> ${c.date}</p><div style="margin-top:10px;"><label>Status:</label><select onchange="updateStatus(${c.id}, this.value)"><option value="Pending" ${c.status==='Pending'?'selected':''}>Pending</option><option value="Complete" ${c.status==='Complete'?'selected':''}>Complete</option><option value="Canceled" ${c.status==='Canceled'?'selected':''}>Canceled</option></select></div></div><table style="width:100%; border-collapse:collapse; background:#111; border-radius:10px; overflow:hidden;"><thead><tr style="background:#222;"><th style="padding:10px; text-align:left;">Service</th><th style="padding:10px; text-align:right;">Price</th></tr></thead><tbody>${itemsHtml}</tbody></table><div class="glass-card" style="margin-top:15px; border:none; background:#1a1a1a;"><div style="display:flex; justify-content:space-between;"><span>Total:</span><span>${c.bill}৳</span></div><div style="display:flex; justify-content:space-between; color:var(--success);"><span>Paid:</span><span>${c.rec}৳</span></div><div style="display:flex; justify-content:space-between; color:var(--danger); font-weight:bold;"><span>Due:</span><span>${c.due}৳</span></div></div><div style="display:flex; gap:10px;"><button class="btn-premium" style="background:#200; color:#f55; flex:1;" onclick="deleteClient(${c.id})">Delete</button><button class="btn-premium" style="flex:1;" onclick="reprintInvoice(${id})">Re-Print</button></div>`;
        document.getElementById('profileModal').style.display = 'flex';
    }

    function updateStatus(id, s) { clients.find(c => c.id === id).status = s; localStorage.setItem('it_clients_v9', JSON.stringify(clients)); renderClients(clients); }
    function deleteClient(id) { if(confirm("Delete?")) { clients = clients.filter(c => c.id !== id); localStorage.setItem('it_clients_v9', JSON.stringify(clients)); location.reload(); } }
    function reprintInvoice(id) { generatePDF('invoice', clients.find(c => c.id === id)); }
    function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }
    function getItems(b) { let a = []; document.querySelectorAll(`#${b} tr`).forEach(r => { let d = r.querySelector('input[class$="-desc"]').value; if(d) a.push({desc: d, qty: r.querySelector('input[class$="-qty"]').value, prc: r.querySelector('input[class$="-prc"]').value, total: r.querySelector('input[class$="-qty"]').value * r.querySelector('input[class$="-prc"]').value}); }); return a; }
    function initChart() { const ctx = document.getElementById('profitChart').getContext('2d'); myChart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ label: 'Cash', data: [], borderColor: '#00d2ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 210, 255, 0.05)' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } } }); }
</script>
</body>
</html>
